<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>GlaMaterials — водяний знак GlamEng</title>
<meta name="description" content="Накладаєш фірмовий водяний знак GlamEng на PDF або фото за пару секунд. Все відбувається прямо в браузері — файли нікуди не завантажуються.">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d45a8f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GlaMaterials">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" href="assets/icons/favicon.png">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">G</span>
      <span class="brand-name">GlaMaterials</span>
    </div>
    <button id="history-btn" class="icon-btn" type="button" aria-label="Історія оброблених файлів">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </button>
  </header>

  <main class="stage">

    <section id="panel-workspace" class="panel panel-workspace">

      <label for="file-input" class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.webp,.heic,.heif,application/pdf,image/jpeg,image/png,image/webp,image/heic,image/heif" multiple hidden>
        <span class="dropzone-icon-wrap">
          <svg class="dropzone-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 6v24m0 0 9-9m-9 9-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 34v4a4 4 0 0 0 4 4h24a4 4 0 0 0 4-4v-4" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <p class="dropzone-title" id="dropzone-title">Перетягни файли сюди або натисни, щоб обрати</p>
        <p class="dropzone-sub">PDF, JPG, PNG, WEBP, HEIC · можна додавати файли по одному · результат завжди рівний, під формат A4</p>
      </label>

      <ul id="job-list" class="job-list"></ul>

      <div id="settings-block" class="settings-block hidden">

        <div id="merge-row" class="segmented-row hidden">
          <span class="segmented-label">Що робимо з файлами</span>
          <div class="segmented" id="merge-toggle" role="tablist">
            <button type="button" class="seg-btn active" data-value="merge">Об'єднати в один</button>
            <button type="button" class="seg-btn" data-value="separate">Окремо кожен</button>
          </div>
        </div>

        <div class="segmented-row">
          <span class="segmented-label">Формат результату</span>
          <div class="segmented" id="format-toggle" role="tablist">
            <button type="button" class="seg-btn active" data-value="pdf">PDF</button>
            <button type="button" class="seg-btn" data-value="photos">Фото в галерею</button>
          </div>
        </div>

        <div class="preview-wrap">
          <canvas id="preview-canvas" class="preview-canvas"></canvas>
          <span id="page-count-badge" class="page-count-badge"></span>
        </div>

        <div class="control-block">
          <div class="control-label-row">
            <label for="opacity-slider">Прозорість водяного знаку</label>
            <span id="opacity-value">35%</span>
          </div>
          <input type="range" id="opacity-slider" min="0" max="70" step="1" value="35">
        </div>

        <button id="export-btn" class="btn-primary" type="button">
          <svg class="btn-primary-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11m0 0 4-4m-4 4-4-4"/><path d="M5 19h14"/></svg>
          <span id="export-btn-label">Завантажити PDF</span>
          <span id="export-spinner" class="btn-spinner hidden" aria-hidden="true"></span>
        </button>
        <div id="export-progress-track" class="progress-track hidden"><div id="export-progress-fill" class="progress-fill"></div></div>
        <button id="clear-btn" class="btn-ghost" type="button">Очистити все</button>
      </div>
    </section>

    <section id="panel-history" class="panel panel-history hidden">
      <div class="history-header">
        <h2>Історія</h2>
        <button id="close-history" class="icon-btn" type="button" aria-label="Закрити історію">✕</button>
      </div>
      <p class="history-note">Останні готові файли зберігаються тут (на цьому пристрої), щоб можна було скачати ще раз.</p>
      <ul id="history-list" class="history-list"></ul>
      <p id="history-empty" class="history-empty">Поки що порожньо — тут з'являться твої оброблені файли.</p>
    </section>

  </main>
